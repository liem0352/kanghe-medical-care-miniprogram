<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 140" width="100%" role="img" aria-labelledby="secCompTitle secCompDesc">
  <title id="secCompTitle">自定义组件 - 章节横幅</title>
  <desc id="secCompDesc">康禾医养微信小程序五个自定义组件横幅:modal、doctor-card、health-card、sos-button、auth。</desc>

  <defs>
    <style>
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
      .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <!-- 画布背景 -->
  <rect x="0" y="0" width="1200" height="140" rx="12" fill="#F4F7F5"/>

  <!-- 左侧章节标题 -->
  <g transform="translate(56 56)">
    <text x="0" y="0" class="mono" font-size="12" fill="#2E7D6B" letter-spacing="1.4">SECTION · 02</text>
    <text x="0" y="32" class="sans" font-size="28" font-weight="700" fill="#1A2E2A">自定义组件</text>
    <text x="0" y="56" class="sans" font-size="14" fill="#8B9A92">5 个可复用 weapp 组件</text>
  </g>

  <!-- 右侧 5 个组件卡(横向排布) -->
  <g transform="translate(440 32)">
    <!-- 1. modal -->
    <g transform="translate(0 0)">
      <rect x="0" y="0" width="140" height="76" rx="8" fill="#FFFFFF" stroke="#2E7D6B" stroke-width="1"/>
      <rect x="12" y="12" width="20" height="20" rx="4" fill="none" stroke="#2E7D6B"/>
      <text x="12" y="50" class="mono" font-size="12" font-weight="700" fill="#1A2E2A">modal</text>
      <text x="12" y="66" class="sans" font-size="10" fill="#8B9A92">通用弹窗</text>
    </g>

    <!-- 2. doctor-card -->
    <g transform="translate(152 0)">
      <rect x="0" y="0" width="140" height="76" rx="8" fill="#FFFFFF" stroke="#2E7D6B" stroke-width="1"/>
      <circle cx="22" cy="22" r="8" fill="none" stroke="#2E7D6B"/>
      <text x="12" y="50" class="mono" font-size="12" font-weight="700" fill="#1A2E2A">doctor-card</text>
      <text x="12" y="66" class="sans" font-size="10" fill="#8B9A92">医生卡片</text>
    </g>

    <!-- 3. health-card -->
    <g transform="translate(304 0)">
      <rect x="0" y="0" width="140" height="76" rx="8" fill="#FFFFFF" stroke="#2E7D6B" stroke-width="1"/>
      <rect x="12" y="12" width="20" height="20" rx="4" fill="#2E7D6B" opacity="0.15"/>
      <line x1="16" y1="22" x2="28" y2="22" stroke="#2E7D6B" stroke-width="1"/>
      <text x="12" y="50" class="mono" font-size="12" font-weight="700" fill="#1A2E2A">health-card</text>
      <text x="12" y="66" class="sans" font-size="10" fill="#8B9A92">健康指标卡</text>
    </g>

    <!-- 4. sos-button(赤陶强调) -->
    <g transform="translate(456 0)">
      <rect x="0" y="0" width="140" height="76" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
      <circle cx="22" cy="22" r="9" fill="none" stroke="#D97757" stroke-width="1.5"/>
      <text x="22" y="26" text-anchor="middle" class="mono" font-size="8" font-weight="700" fill="#D97757">SOS</text>
      <text x="12" y="50" class="mono" font-size="12" font-weight="700" fill="#1A2E2A">sos-button</text>
      <text x="12" y="66" class="sans" font-size="10" fill="#8B9A92">紧急求助按钮</text>
    </g>

    <!-- 5. auth -->
    <g transform="translate(608 0)">
      <rect x="0" y="0" width="140" height="76" rx="8" fill="#FFFFFF" stroke="#2E7D6B" stroke-width="1"/>
      <rect x="12" y="12" width="20" height="20" rx="4" fill="none" stroke="#2E7D6B"/>
      <path d="M 16 22 L 20 26 L 28 18" fill="none" stroke="#2E7D6B" stroke-width="1.4"/>
      <text x="12" y="50" class="mono" font-size="12" font-weight="700" fill="#1A2E2A">auth</text>
      <text x="12" y="66" class="sans" font-size="10" fill="#8B9A92">鉴权拦截</text>
    </g>
  </g>
</svg>
