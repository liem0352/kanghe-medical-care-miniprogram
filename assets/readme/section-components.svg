<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 140" width="100%" role="img" aria-labelledby="secCompTitle secCompDesc">
  <title id="secCompTitle">自定义组件章节横幅</title>
  <desc id="secCompDesc">康禾医养微信小程序五个自定义组件横幅:modal、doctor-card、health-card、sos-button、auth。</desc>
  <defs>
    <style>
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans GB", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <!-- 画布背景 -->
  <rect x="0" y="0" width="1200" height="140" rx="12" fill="#F4F7F5"/>

  <!-- 左侧章节标题(无编号 eyebrow) -->
  <g transform="translate(56 50)">
    <text x="0" y="0" class="sans" font-size="28" font-weight="700" fill="#1A2E2A">自定义组件</text>
    <text x="0" y="28" class="sans" font-size="14" fill="#8B9A92">5 个可复用 weapp 组件</text>
  </g>

  <!-- 右侧 5 个组件卡横向排布 -->
  <g transform="translate(280 32)">
    <!-- 1. modal -->
    <g transform="translate(0 0)">
      <rect x="0" y="0" width="150" height="76" rx="8" fill="#FFFFFF" stroke="#2E7D6B" stroke-width="1"/>
      <rect x="14" y="14" width="22" height="22" rx="4" fill="none" stroke="#2E7D6B"/>
      <text x="14" y="52" class="mono" font-size="13" font-weight="700" fill="#1A2E2A">modal</text>
      <text x="14" y="68" class="sans" font-size="11" fill="#8B9A92">通用弹窗</text>
    </g>

    <!-- 2. doctor-card -->
    <g transform="translate(168 0)">
      <rect x="0" y="0" width="150" height="76" rx="8" fill="#FFFFFF" stroke="#2E7D6B" stroke-width="1"/>
      <circle cx="25" cy="25" r="9" fill="none" stroke="#2E7D6B"/>
      <text x="14" y="52" class="mono" font-size="13" font-weight="700" fill="#1A2E2A">doctor-card</text>
      <text x="14" y="68" class="sans" font-size="11" fill="#8B9A92">医生卡片</text>
    </g>

    <!-- 3. health-card -->
    <g transform="translate(336 0)">
      <rect x="0" y="0" width="150" height="76" rx="8" fill="#FFFFFF" stroke="#2E7D6B" stroke-width="1"/>
      <rect x="14" y="14" width="22" height="22" rx="4" fill="#2E7D6B" opacity="0.15"/>
      <line x1="18" y1="25" x2="32" y2="25" stroke="#2E7D6B" stroke-width="1"/>
      <text x="14" y="52" class="mono" font-size="13" font-weight="700" fill="#1A2E2A">health-card</text>
      <text x="14" y="68" class="sans" font-size="11" fill="#8B9A92">健康指标卡</text>
    </g>

    <!-- 4. sos-button(赤陶强调) -->
    <g transform="translate(504 0)">
      <rect x="0" y="0" width="150" height="76" rx="8" fill="#FFFFFF" stroke="#D97757" stroke-width="1.5"/>
      <circle cx="25" cy="25" r="10" fill="none" stroke="#D97757" stroke-width="1.5"/>
      <text x="25" y="29" text-anchor="middle" class="mono" font-size="9" font-weight="700" fill="#D97757">SOS</text>
      <text x="14" y="52" class="mono" font-size="13" font-weight="700" fill="#1A2E2A">sos-button</text>
      <text x="14" y="68" class="sans" font-size="11" fill="#8B9A92">紧急求助</text>
    </g>

    <!-- 5. auth -->
    <g transform="translate(672 0)">
      <rect x="0" y="0" width="150" height="76" rx="8" fill="#FFFFFF" stroke="#2E7D6B" stroke-width="1"/>
      <rect x="14" y="14" width="22" height="22" rx="4" fill="none" stroke="#2E7D6B"/>
      <path d="M 19 25 L 24 30 L 32 20" fill="none" stroke="#2E7D6B" stroke-width="1.4"/>
      <text x="14" y="52" class="mono" font-size="13" font-weight="700" fill="#1A2E2A">auth</text>
      <text x="14" y="68" class="sans" font-size="11" fill="#8B9A92">鉴权拦截</text>
    </g>
  </g>
</svg>
